<!DOCTYPE html>
<html lang="ht">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="ORIZON - Kontaj ofisyèl pou lansman kominote Ayisyen an. Rete kwè, nap vini!">
    <meta name="theme-color" content="#061525">
    <title>🇭🇹 ORIZON — TikTak...</title>
    <style>
        :root {
            --blue-deep: #061525;
            --blue-dark: #0b1f38;
            --cyan: #00c6e6;
            --cyan-glow: #00e5ff;
            --red-vibrant: #d41b3f;
            --red-glow: #ff3555;
            --white: #f0f0f5;
            --text-secondary: #b0b8c5;
            --text-muted: #6b7280;
            --card-bg: rgba(15, 25, 45, 0.7);
            --card-border: rgba(255, 255, 255, 0.06);
            --radius-lg: 24px;
            --font-sans: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
            --font-display: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
            --transition-smooth: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scrollbar-width: thin;
            scrollbar-color: rgba(255, 255, 255, 0.15) transparent;
            font-size: 16px;
        }

        ::-webkit-scrollbar {
            width: 5px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.15);
            border-radius: 10px;
        }

        body {
            font-family: var(--font-sans);
            background: var(--blue-deep);
            color: var(--white);
            line-height: 1.6;
            overflow-x: hidden;
            cursor: none;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            padding: 20px;
        }

        @media (max-width: 768px) {
            body {
                cursor: auto;
            }
        }

        /* Custom Cursor */
        .cursor-dot {
            position: fixed;
            top: 0;
            left: 0;
            width: 8px;
            height: 8px;
            background: var(--cyan-glow);
            border-radius: 50%;
            pointer-events: none;
            z-index: 99999;
            transition: transform 0.08s ease-out, background 0.2s;
            box-shadow: 0 0 18px var(--cyan-glow), 0 0 40px rgba(0, 229, 255, 0.5);
            transform: translate(-50%, -50%);
        }

        .cursor-ring {
            position: fixed;
            top: 0;
            left: 0;
            width: 36px;
            height: 36px;
            border: 1.5px solid rgba(255, 255, 255, 0.35);
            border-radius: 50%;
            pointer-events: none;
            z-index: 99998;
            transition: width 0.25s ease, height 0.25s ease, border-color 0.25s;
            transform: translate(-50%, -50%);
        }

        .cursor-ring.hovering {
            width: 55px;
            height: 55px;
            border-color: var(--cyan-glow);
            background: rgba(0, 229, 255, 0.06);
        }

        @media (max-width: 768px) {
            .cursor-dot,
            .cursor-ring {
                display: none;
            }
        }

        /* Loader */
        .loader-overlay {
            position: fixed;
            inset: 0;
            background: var(--blue-deep);
            z-index: 100000;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.6s ease, visibility 0.6s ease;
        }
        .loader-overlay.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }
        .loader-content {
            text-align: center;
        }
        .loader-logo {
            font-family: var(--font-display);
            font-size: 3.5rem;
            font-weight: 800;
            letter-spacing: 0.06em;
            color: #004aad;
            display: inline-block;
            animation: loaderPulse 1.2s ease-in-out infinite;
        }
        .loader-logo span {
            color: #d11b3e;
        }
        .loader-bar-wrap {
            margin-top: 20px;
            width: 180px;
            height: 3px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            overflow: hidden;
            margin-inline: auto;
        }
        .loader-bar {
            height: 100%;
            width: 0%;
            background: var(--cyan-glow);
            border-radius: 10px;
            animation: loaderBar 1.5s ease-in-out infinite;
            box-shadow: 0 0 20px var(--cyan-glow);
        }
        @keyframes loaderPulse {
            0%, 100% { opacity: 0.7; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.04); }
        }
        @keyframes loaderBar {
            0% { width: 0%; margin-left: 0%; }
            50% { width: 70%; margin-left: 15%; }
            100% { width: 0%; margin-left: 100%; }
        }

        /* Particle Canvas */
        #particlesCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            opacity: 0.5;
        }

        /* Glow decorations */
        .glow-orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            pointer-events: none;
            z-index: 0;
            opacity: 0.12;
        }
        .glow-1 {
            width: 500px;
            height: 500px;
            background: var(--cyan);
            top: -10%;
            left: -10%;
        }
        .glow-2 {
            width: 400px;
            height: 400px;
            background: var(--red-vibrant);
            bottom: -5%;
            right: -5%;
        }
        .glow-3 {
            width: 300px;
            height: 300px;
            background: var(--cyan);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        /* Main Container */
        .timer-container {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 700px;
            text-align: center;
            padding: 40px 30px;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 40px;
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.5), 0 0 60px rgba(0, 229, 255, 0.08);
            animation: fadeInUp 0.8s ease forwards;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo {
            font-family: var(--font-display);
            font-size: 3rem;
            font-weight: 900;
            letter-spacing: 0.05em;
            margin-bottom: 10px;
        }
        .logo .ori {
            color: #004aad;
        }
        .logo .zon {
            color: #d11b3e;
        }

        .subtitle {
            font-size: 1.1rem;
            color: var(--text-secondary);
            margin-bottom: 12px;
        }

        .tagline {
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-bottom: 35px;
            font-weight: 500;
        }

        /* Timer Grid */
        .timer-grid {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 35px;
        }

        .timer-card {
            background: rgba(15, 25, 45, 0.75);
            border: 1px solid var(--card-border);
            border-radius: var(--radius-lg);
            padding: 25px 18px;
            min-width: 90px;
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            box-shadow: 0 0 25px rgba(0, 229, 255, 0.08);
            transition: all var(--transition-smooth);
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            overflow: hidden;
        }

        .timer-card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at center, rgba(0, 229, 255, 0.08) 0%, transparent 70%);
            opacity: 0;
            transition: opacity 0.4s ease;
            pointer-events: none;
        }

        .timer-card:hover::before {
            opacity: 1;
        }

        .timer-card:hover {
            border-color: rgba(0, 229, 255, 0.4);
            box-shadow: 0 0 45px rgba(0, 229, 255, 0.2);
            transform: translateY(-3px);
        }

        .timer-number {
            font-family: var(--font-display);
            font-size: 3rem;
            font-weight: 900;
            letter-spacing: -0.02em;
            color: var(--white);
            line-height: 1;
            background: linear-gradient(135deg, #fff, var(--cyan-glow));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 6px;
        }

        .timer-label {
            font-size: 0.8rem;
            font-weight: 600;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            color: var(--text-muted);
        }

        .timer-separator {
            font-size: 2.5rem;
            font-weight: 300;
            color: var(--text-muted);
            margin: 0 4px;
            line-height: 1;
            opacity: 0.5;
            user-select: none;
        }

        @media (max-width: 600px) {
            .timer-container {
                padding: 30px 20px;
                border-radius: 30px;
            }
            .timer-grid {
                gap: 8px;
            }
            .timer-card {
                padding: 20px 12px;
                min-width: 70px;
            }
            .timer-number {
                font-size: 2rem;
            }
            .timer-separator {
                font-size: 1.8rem;
                margin: 0 2px;
            }
            .timer-label {
                font-size: 0.7rem;
            }
            .logo {
                font-size: 2.2rem;
            }
        }

        /* Buttons */
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 14px 28px;
            border-radius: 28px;
            font-weight: 600;
            font-size: 0.95rem;
            letter-spacing: 0.03em;
            text-decoration: none;
            cursor: pointer;
            transition: all var(--transition-smooth);
            border: none;
            white-space: nowrap;
        }

        .btn-primary {
            background: #d41b3f;
            color: #fff;
            box-shadow: 0 0 30px rgba(212, 27, 63, 0.4);
        }

        .btn-primary:hover {
            background: #e83250;
            box-shadow: 0 0 50px rgba(255, 53, 85, 0.55);
            transform: translateY(-2px);
        }

        .btn-icon {
            width: 18px;
            height: 18px;
        }

        .discord-btn {
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <!-- Loader -->
    <div class="loader-overlay" id="loader">
        <div class="loader-content">
            <div class="loader-logo">ORI<span>ZON</span></div>
            <div class="loader-bar-wrap"><div class="loader-bar"></div></div>
        </div>
    </div>

    <!-- Custom Cursor -->
    <div class="cursor-dot" id="cursorDot"></div>
    <div class="cursor-ring" id="cursorRing"></div>

    <!-- Particles -->
    <canvas id="particlesCanvas"></canvas>

    <!-- Glow Orbs -->
    <div class="glow-orb glow-1"></div>
    <div class="glow-orb glow-2"></div>
    <div class="glow-orb glow-3"></div>

    <!-- Main Countdown Container -->
    <div class="timer-container">
        <div class="logo">
            <span class="ori">ORI</span><span class="zon">ZON</span>
        </div>
        <p class="subtitle">Lansman ofisyèl ap fèt nan</p>
        <p class="tagline">N ap finalize detay pou nou ba w pi bon eksperyans lan. Mèsi pou pasyans ou.</p>

        <div class="timer-grid" id="countdown">
            <div class="timer-card">
                <span class="timer-number" id="days">00</span>
                <span class="timer-label">Jou</span>
            </div>
            <div class="timer-separator">:</div>
            <div class="timer-card">
                <span class="timer-number" id="hours">00</span>
                <span class="timer-label">Èdtan</span>
            </div>
            <div class="timer-separator">:</div>
            <div class="timer-card">
                <span class="timer-number" id="minutes">00</span>
                <span class="timer-label">Minut</span>
            </div>
            <div class="timer-separator">:</div>
            <div class="timer-card">
                <span class="timer-number" id="seconds">00</span>
                <span class="timer-label">Segonn</span>
            </div>
        </div>
    </div>

    <script>
        (function() {
            // === LOADER ===
            const loader = document.getElementById('loader');
            window.addEventListener('load', () => {
                setTimeout(() => {
                    loader.classList.add('hidden');
                }, 1800);
            });
            if (document.readyState === 'complete') {
                setTimeout(() => {
                    loader.classList.add('hidden');
                }, 1800);
            }

            // === CUSTOM CURSOR ===
            const cursorDot = document.getElementById('cursorDot');
            const cursorRing = document.getElementById('cursorRing');
            if (window.innerWidth > 768) {
                let mouseX = 0, mouseY = 0;
                let ringX = 0, ringY = 0;

                document.addEventListener('mousemove', (e) => {
                    mouseX = e.clientX;
                    mouseY = e.clientY;
                    cursorDot.style.left = mouseX + 'px';
                    cursorDot.style.top = mouseY + 'px';
                });

                function animateRing() {
                    ringX += (mouseX - ringX) * 0.18;
                    ringY += (mouseY - ringY) * 0.18;
                    cursorRing.style.left = ringX + 'px';
                    cursorRing.style.top = ringY + 'px';
                    requestAnimationFrame(animateRing);
                }
                animateRing();

                const hoverElements = document.querySelectorAll('a, button, .timer-card, .btn');
                hoverElements.forEach(el => {
                    el.addEventListener('mouseenter', () => cursorRing.classList.add('hovering'));
                    el.addEventListener('mouseleave', () => cursorRing.classList.remove('hovering'));
                });
            }

            // === PARTICLES ===
            const canvas = document.getElementById('particlesCanvas');
            const ctx = canvas.getContext('2d');
            let particles = [];
            let canvasW, canvasH;

            function resizeCanvas() {
                canvasW = canvas.width = window.innerWidth;
                canvasH = canvas.height = window.innerHeight;
            }
            resizeCanvas();
            window.addEventListener('resize', () => {
                resizeCanvas();
                initParticles();
            });

            function initParticles() {
                const count = Math.min(Math.floor((canvasW * canvasH) / 18000), 100);
                particles = [];
                for (let i = 0; i < count; i++) {
                    particles.push({
                        x: Math.random() * canvasW,
                        y: Math.random() * canvasH,
                        vx: (Math.random() - 0.5) * 0.35,
                        vy: (Math.random() - 0.5) * 0.35,
                        r: Math.random() * 1.6 + 0.5,
                        alpha: Math.random() * 0.5 + 0.2,
                    });
                }
            }
            initParticles();

            function drawParticles() {
                ctx.clearRect(0, 0, canvasW, canvasH);
                particles.forEach(p => {
                    p.x += p.vx;
                    p.y += p.vy;
                    if (p.x < -20) p.x = canvasW + 20;
                    if (p.x > canvasW + 20) p.x = -20;
                    if (p.y < -20) p.y = canvasH + 20;
                    if (p.y > canvasH + 20) p.y = -20;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(0,229,255,${p.alpha})`;
                    ctx.fill();
                });
                requestAnimationFrame(drawParticles);
            }
            drawParticles();

            // === COUNTDOWN TIMER ===
            // Définis la date de lancement (année-mois-jour T heure:minute:seconde fuseau)
            // Ici : 31 décembre 2026, 20:00 (UTC-5, heure d'Haïti)
            const launchDate = new Date('2026-05-18T00:00:00-05:00').getTime();

            const daysEl = document.getElementById('days');
            const hoursEl = document.getElementById('hours');
            const minutesEl = document.getElementById('minutes');
            const secondsEl = document.getElementById('seconds');

            function updateTimer() {
                const now = new Date().getTime();
                const distance = launchDate - now;

                if (distance < 0) {
                    daysEl.textContent = '00';
                    hoursEl.textContent = '00';
                    minutesEl.textContent = '00';
                    secondsEl.textContent = '00';
                    return;
                }

                const days = Math.floor(distance / (1000 * 60 * 60 * 24));
                const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
                const seconds = Math.floor((distance % (1000 * 60)) / 1000);

                daysEl.textContent = days.toString().padStart(2, '0');
                hoursEl.textContent = hours.toString().padStart(2, '0');
                minutesEl.textContent = minutes.toString().padStart(2, '0');
                secondsEl.textContent = seconds.toString().padStart(2, '0');
            }

            updateTimer();
            setInterval(updateTimer, 1000);
        })();
    </script>
</body>
</html>
